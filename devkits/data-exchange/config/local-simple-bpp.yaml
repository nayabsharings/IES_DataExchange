appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transactionId
    - messageId
    - subscriber_id
    - module_id
http:
  port: 8082
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg,indiaenergystack.in/winroom-ies-data-exchange"
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: APEPDCL_TEST
            keyId: 76EU8Ud7iWZFHdGmxPpDAuc8c3S5AEQAgLN7Gr6c19rFJJC9Lp9k9v
            signingPrivateKey: WrBv1IjOsnhZIpXv9h7cnQIvq1mYpzkWx7bf8dVKpd8=
            signingPublicKey: PrtrWFsfREzBenDUkFhlMdZnUhVX4jMcQk0sA/KX7LE=
            encrPrivateKey: WrBv1IjOsnhZIpXv9h7cnQIvq1mYpzkWx7bf8dVKpd8=
            encrPublicKey: PrtrWFsfREzBenDUkFhlMdZnUhVX4jMcQk0sA/KX7LE=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io,india-energy-stack.github.io"
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BPPReceiver.yaml
        middleware:
          # Verifiable Credential validator. Runs outermost on the BPP
          # receiver: for the gated action(s) it verifies every embedded VC
          # (e.g. the MeterDataRequestCredential carried in the confirm
          # receiver participant) and rejects the request with a NACK if a
          # credential's proof is invalid, expired, revoked, or signed by
          # someone other than its issuer.
          - id: vcvalidator
            config:
              enabled: "true"
              actions: "confirm"
              allowedDidMethods: "key,jwk,web"
              checkExpiry: "true"
              checkRevocation: "true"
              requireProof: "true"
              failOpen: "false"
              httpTimeout: "10"
              debugLogging: "true"
      steps:
        - validateSign
        - addRoute
        - validateSchema

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg,indiaenergystack.in/winroom-ies-data-exchange"
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: APEPDCL_TEST
            keyId: 76EU8Ud7iWZFHdGmxPpDAuc8c3S5AEQAgLN7Gr6c19rFJJC9Lp9k9v
            signingPrivateKey: WrBv1IjOsnhZIpXv9h7cnQIvq1mYpzkWx7bf8dVKpd8=
            signingPublicKey: PrtrWFsfREzBenDUkFhlMdZnUhVX4jMcQk0sA/KX7LE=
            encrPrivateKey: WrBv1IjOsnhZIpXv9h7cnQIvq1mYpzkWx7bf8dVKpd8=
            encrPublicKey: PrtrWFsfREzBenDUkFhlMdZnUhVX4jMcQk0sA/KX7LE=
        cache:
          id: cache
          config:
            addr: redis:6379
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io,india-energy-stack.github.io"
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BPPCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              contextKeys: transactionId,messageId
              role: bpp
      steps:
        - addRoute
        - sign
        - validateSchema